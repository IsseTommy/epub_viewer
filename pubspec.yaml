name: epub_viewer
description: 
  'epub_viewer forked from epub_reader'
version: 1.0.0
homepage: https://github.com/IsseTommy/epub_viewer

environment:
  sdk: ">=2.1.0 <3.0.0"
  flutter: ^1.10.0

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.0.1
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.jideguru.epub_viewer
        pluginClass: EpubViewerPlugin
      ios:
        pluginClass: EpubViewerPlugin